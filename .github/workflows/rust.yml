name: Rust

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  code-quality: write
  pull-requests: read

env:
  CARGO_TERM_COLOR: always

jobs:
  sdk:
    name: SDK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly
          components: clippy, rustfmt
      - name: Check formatting
        run: cargo +nightly fmt --all -- --check
      - name: Run SDK Clippy
        run: RUSTFLAGS="-Dwarnings" cargo clippy --package llm-sdk-rs
      - name: Build SDK
        run: cargo build --package llm-sdk-rs

  agent:
    name: Agent
    needs: sdk
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly
          components: clippy
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Run agent Clippy
        run: RUSTFLAGS="-Dwarnings" cargo clippy --package llm-agent
      - name: Build agent
        run: cargo build --package llm-agent
      - name: Test agent with coverage
        run: |
          cargo llvm-cov --no-report --package llm-agent
          cargo llvm-cov report --package llm-agent --cobertura --output-path coverage-rust.xml
      - name: Upload agent coverage
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: actions/upload-code-coverage@v1
        with:
          file: coverage-rust.xml
          language: Rust
          label: code-coverage/agent-rust
          fail-on-error: false

name: Rust

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  code-quality: write
  pull-requests: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Set up Node.js for shared SDK tests
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly
          components: clippy, rustfmt
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run Clippy
        run: RUSTFLAGS="-Dwarnings" cargo clippy
      - name: Run Formatter
        run: cargo +nightly fmt -- --check
      - name: Build
        run: cargo build

      - name: Test agent library
        run: cargo test --package llm-agent

      - name: Run live SDK tests
        id: live-sdk-tests
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [[ -z "$ANTHROPIC_API_KEY" || -z "$GOOGLE_API_KEY" || -z "$OPENAI_API_KEY" ]]; then
            echo "Skipping live SDK tests because one or more provider secrets are unavailable."
            exit 0
          fi
          set +e
          cargo llvm-cov --no-report --package llm-sdk-rs --tests
          test_status=$?
          cargo llvm-cov report --cobertura --output-path coverage-rust.xml
          if [[ -s coverage-rust.xml ]]; then
            echo "coverage=true" >> "$GITHUB_OUTPUT"
          fi
          exit "$test_status"

      - name: Upload Rust SDK coverage
        if: ${{ steps.live-sdk-tests.outputs.coverage == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: actions/upload-code-coverage@v1
        with:
          file: coverage-rust.xml
          language: Rust
          label: code-coverage/sdk-rust
